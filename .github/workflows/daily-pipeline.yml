name: Daily Tool Generation Pipeline

on:
  schedule:
    # 09:00 UTC every day
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      from_agent:
        description: 'Start from agent number (1=research, 2=planning, 3=development, 4=deploy, 5=social)'
        required: false
        default: '1'
        type: choice
        options: ['1', '2', '3', '4', '5']
      date_override:
        description: 'Override run date (YYYY-MM-DD, leave blank for today)'
        required: false
        default: ''

jobs:
  generate-tool:
    name: Generate and deploy daily tool
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Prefer the PAT (needed for opening PRs against branch-protected
          # main and for triggering downstream workflows). Fall back to the
          # runner's auto-issued GITHUB_TOKEN so the checkout never lands
          # without auth — that empty-token state was the root cause of
          # runs #36–#43 silently failing with "could not read Username".
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Build extra args
        id: args
        run: |
          EXTRA=""
          FROM_AGENT="${{ github.event.inputs.from_agent }}"
          DATE_OVERRIDE="${{ github.event.inputs.date_override }}"
          if [ -n "$FROM_AGENT" ] && [ "$FROM_AGENT" != "1" ]; then
            EXTRA="$EXTRA --from-agent $FROM_AGENT"
          fi
          if [ -n "$DATE_OVERRIDE" ]; then
            EXTRA="$EXTRA --date $DATE_OVERRIDE"
          fi
          echo "extra=$EXTRA" >> "$GITHUB_OUTPUT"

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          # Fallback for pipeline/agents/deploy.py::_configure_git when GH_PAT
          # is unset/empty. Workflow has `permissions: contents: write` so
          # this token can push to main; PR creation will still require GH_PAT.
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          DEPLOY_TO_MAIN: ${{ vars.DEPLOY_TO_MAIN || 'false' }}
          # Social Media — Agent 5 (missing secrets are handled gracefully)
          SOCIAL_DRAFT_MODE: ${{ vars.SOCIAL_DRAFT_MODE || 'true' }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
        run: python pipeline/run.py ${{ steps.args.outputs.extra }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-run-${{ github.run_id }}
          path: runs/
          retention-days: 7
          if-no-files-found: warn
