name: Daily Tool Generation Pipeline

on:
  schedule:
    # 09:00 UTC every day
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      from_agent:
        description: 'Start from agent number (1=research, 2=planning, 3=development, 4=deploy)'
        required: false
        default: '1'
        type: choice
        options: ['1', '2', '3', '4']
      date_override:
        description: 'Override run date (YYYY-MM-DD, leave blank for today)'
        required: false
        default: ''

jobs:
  generate-tool:
    name: Generate and deploy daily tool
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use PAT so the pipeline can push branches and create PRs
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Build extra args
        id: args
        run: |
          EXTRA=""
          FROM_AGENT="${{ github.event.inputs.from_agent }}"
          DATE_OVERRIDE="${{ github.event.inputs.date_override }}"
          if [ -n "$FROM_AGENT" ] && [ "$FROM_AGENT" != "1" ]; then
            EXTRA="$EXTRA --from-agent $FROM_AGENT"
          fi
          if [ -n "$DATE_OVERRIDE" ]; then
            EXTRA="$EXTRA --date $DATE_OVERRIDE"
          fi
          echo "extra=$EXTRA" >> "$GITHUB_OUTPUT"

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
          DEPLOY_TO_MAIN: ${{ vars.DEPLOY_TO_MAIN || 'false' }}
        run: python pipeline/run.py ${{ steps.args.outputs.extra }}

      - name: Upload run artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-runs-${{ github.run_number }}
          path: runs/
          retention-days: 7
          if-no-files-found: warn
