  <span class="rune-whisper rune-whisper--tr" aria-hidden="true">☽ ✧ ☾</span>
  <span class="rune-whisper rune-whisper--bl" aria-hidden="true">⚜ ⧫ ❂</span>
  <span class="rune-whisper rune-whisper--br" aria-hidden="true">✶ ⟢ ✷</span>
  <app-root></app-root>
  <button
    type="button"
    class="arcane-seal"
    aria-label="Arcane seal — click to peek behind the veil"
    title="whispers…"
    onclick="(function(){var b=document.body;b.classList.toggle('ritual-open');if(b.classList.contains('ritual-open')){console.log('%c✦ The veil parts. ✦','color:#00ffcc;font-family:Orbitron;font-size:16px;text-shadow:0 0 12px #00ffcc');}})()"
  ></button>
  <script>
    // ░▒▓█ easter eggs █▓▒░
    (function () {
      try {
        var banner = [
          '',
          '   ░▒▓█ x s a n t c a s t x █▓▒░',
          '',
          '        ✧ ⟡ ⚝ ✶ ☽ ✧ ☾ ✷ ⟢ ⚜',
          '',
          '   » You found the console. Welcome, seeker.',
          '   » Whisper the old sequence:',
          '        ↑ ↑ ↓ ↓ ← → ← → B A',
          '   » Or click the sigil in the corner.',
          '   » Type xsantcastx.reveal() for another secret.',
          ''
        ].join('\n');
        console.log('%c' + banner,
          'color:#00ffcc;font-family:Menlo,monospace;line-height:1.4;text-shadow:0 0 8px rgba(0,255,204,0.4)');
      } catch (e) {}

      // Konami code → ritual mode
      var code = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
      var idx = 0;
      window.addEventListener('keydown', function (e) {
        var k = (e.key || '').length === 1 ? e.key.toLowerCase() : e.key;
        idx = (k === code[idx]) ? idx + 1 : 0;
        if (idx === code.length) {
          idx = 0;
          document.body.classList.add('ritual-open');
          try { console.log('%c✦ The sigil answers. ✦','color:#ff00ff;font-size:18px;font-family:Orbitron;text-shadow:0 0 14px #ff00ff'); } catch (e2) {}
        }
      }, { passive: true });

      // Hidden helper
      try {
        window.xsantcastx = window.xsantcastx || {};
        window.xsantcastx.reveal = function () {
          document.body.classList.toggle('ritual-open');
          var msgs = [
            'built in the dark, shipped in the light.',
            'every tool here is a small spell.',
            'the sigil was always watching.',
            'ctrl+shift+k opens the other door.'
          ];
          var m = msgs[Math.floor(Math.random() * msgs.length)];
          console.log('%c☾ ' + m + ' ☽', 'color:#7b61ff;font-family:Orbitron;font-size:14px;text-shadow:0 0 10px #7b61ff');
          return '✧';
        };
      } catch (e) {}
    })();
  </script>
