<a href="#main-content" class="skip-to-main">Skip to main content</a>
<div class="particle-layer" *ngIf="!isEmbedMode"></div>
<app-header *ngIf="!isEmbedMode"></app-header>

<main id="main-content" [class.embed-mode]="isEmbedMode" [class.embed-theme-light]="isEmbedMode && embed.theme === 'light'">
  <router-outlet></router-outlet>
</main>

<app-embed-bar *ngIf="isEmbedMode && showEmbedBranding"></app-embed-bar>
<app-footer *ngIf="!isEmbedMode"></app-footer>

<!-- GDPR Cookie Banner -->
<app-cookie-banner *ngIf="!isEmbedMode"></app-cookie-banner>

<!-- Mystery milestone celebration -->
<app-milestone-effect *ngIf="!isEmbedMode"></app-milestone-effect>

<!-- Easter egg discovery toast -->
<app-egg-discovery *ngIf="!isEmbedMode"></app-egg-discovery>

<!-- Site-wide Cmd+K / Ctrl+K command palette -->
<app-command-palette *ngIf="!isEmbedMode"></app-command-palette>
