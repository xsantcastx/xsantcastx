<a href="#main-content" class="skip-to-main">Skip to main content</a>
@if (!isEmbedMode) {
  <div class="particle-layer"></div>
}
@if (!isEmbedMode) {
  <app-header></app-header>
}

<main id="main-content" [class.embed-mode]="isEmbedMode" [class.embed-theme-light]="isEmbedMode && embed.theme === 'light'">
  <router-outlet></router-outlet>
</main>

@if (isEmbedMode && showEmbedBranding) {
  <app-embed-bar></app-embed-bar>
}
@if (!isEmbedMode) {
  <app-footer></app-footer>
}

<!-- GDPR Cookie Banner -->
@if (!isEmbedMode) {
  <app-cookie-banner></app-cookie-banner>
}

<!-- Mystery milestone celebration -->
@if (!isEmbedMode) {
  <app-milestone-effect></app-milestone-effect>
}

<!-- Easter egg discovery toast -->
@if (!isEmbedMode) {
  <app-egg-discovery></app-egg-discovery>
}

<!-- Site-wide Cmd+K / Ctrl+K command palette -->
@if (!isEmbedMode) {
  <app-command-palette></app-command-palette>
}
