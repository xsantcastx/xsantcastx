<section class="not-found-container">
  <div class="glass-card">
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Page Not Found</h2>
    <p class="error-message">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <div class="cta-group">
      <a routerLink="/home" class="cta-button primary">Back to Home</a>
      <a routerLink="/tools" class="cta-button secondary">Browse Tools</a>
    </div>
  </div>

  <div class="floating-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- A lost star drifts across the cosmic void — pure CSS, no JS needed -->
  <div class="lost-star" aria-hidden="true">
    <span class="lost-star__trail"></span>
    <span class="lost-star__core"></span>
    <span class="lost-star__whisper">a star drifted off course</span>
  </div>
</section>
