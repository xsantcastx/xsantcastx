<div class="tools-page">
  <div class="tools-header">
    <div class="tools-header__eyebrow">{{ translate('tools.page.eyebrow') }}</div>
    <h1 class="tools-header__title">{{ translate('tools.page.title') }}</h1>
    <p class="tools-header__subtitle">{{ translate('tools.page.subtitle') }}</p>
    <div class="tools-header__share">
      <a [href]="twitterShareUrl" target="_blank" rel="noopener" class="share-btn share-btn--twitter" aria-label="Share on X / Twitter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.261 5.638 5.902-5.638Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        {{ translate('tools.page.share.x') }}
      </a>
      <a [href]="linkedInShareUrl" target="_blank" rel="noopener" class="share-btn share-btn--linkedin" aria-label="Share on LinkedIn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn
      </a>
    </div>
  </div>

  <div class="tools-grid">
    <div
      *ngFor="let tool of tools"
      class="tool-card"
      [class.tool-card--live]="tool.status === 'live'"
      [class.tool-card--soon]="tool.status === 'coming-soon'"
      (click)="navigate(tool)"
      [attr.role]="tool.status === 'live' ? 'button' : null"
      [attr.tabindex]="tool.status === 'live' ? 0 : null"
      (keydown.enter)="navigate(tool)"
    >
      <div class="tool-card__icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
             [innerHTML]="tool.icon">
        </svg>
      </div>

      <div class="tool-card__body">
        <div class="tool-card__title-row">
          <h2 class="tool-card__title">{{ tool.title }}</h2>
          <span *ngIf="tool.status === 'coming-soon'" class="tool-badge-soon">{{ translate('tools.badge.soon') }}</span>
        </div>
        <p class="tool-card__desc">{{ tool.description }}</p>
        <div class="tool-card__tags">
          <span *ngFor="let tag of tool.tags" class="tool-tag">{{ tag }}</span>
        </div>
      </div>

      <div *ngIf="tool.status === 'live'" class="tool-card__arrow" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </div>
  </div>
</div>
