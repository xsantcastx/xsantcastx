<div class="sps-page">
  <button class="back-link" (click)="goBack()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Tools
  </button>

  <header class="tool-header">
    <p class="tool-header__eyebrow">Design Tools</p>
    <h1 class="tool-header__title">Spacing Scale Generator</h1>
    <p class="tool-header__subtitle">Generate consistent spacing scales (linear or geometric) with visual bars and CSS variable output.</p>
    <div class="tool-header__share">
      <a [href]="twitterShareUrl" target="_blank" rel="noopener noreferrer" class="share-btn">Share on X</a>
      <a [href]="linkedInShareUrl" target="_blank" rel="noopener noreferrer" class="share-btn">Share on LinkedIn</a>
    </div>
  </header>

  <div class="sps-layout">
    <div class="sps-col sps-col--left">
      <div class="sps-panel">
        <div class="sps-panel__header"><span class="sps-panel__title">Options</span></div>
        <div class="sps-options">
          <div class="sps-field">
            <label class="sps-label">Base (px)</label>
            <input class="sps-input" type="number" [(ngModel)]="base" (ngModelChange)="generate()" min="0" />
          </div>
          <div class="sps-field">
            <label class="sps-label">Steps</label>
            <input class="sps-input" type="number" [(ngModel)]="steps" (ngModelChange)="generate()" min="1" max="20" />
          </div>
          <div class="sps-field">
            <label class="sps-label">Mode</label>
            <div class="sps-seg-ctrl">
              <button class="sps-seg-btn" [class.sps-seg-btn--active]="mode==='linear'" (click)="mode='linear'; generate()">Linear</button>
              <button class="sps-seg-btn" [class.sps-seg-btn--active]="mode==='geometric'" (click)="mode='geometric'; generate()">Geometric</button>
            </div>
          </div>
          <div class="sps-field" *ngIf="mode==='geometric'">
            <label class="sps-label">Ratio</label>
            <input class="sps-input" type="number" [(ngModel)]="ratio" (ngModelChange)="generate()" min="1" max="4" step="0.1" />
          </div>
        </div>
      </div>

      <div class="sps-panel">
        <div class="sps-panel__header">
          <span class="sps-panel__title">CSS Variables</span>
          <button class="sps-btn-ghost" (click)="copyCss()" [class.sps-btn-ghost--success]="copied">{{ copied ? 'Copied!' : 'Copy' }}</button>
        </div>
        <pre class="sps-code"><code>:root {{ '{' }}
{{ cssVariables }}
{{ '}' }}</code></pre>
      </div>
    </div>

    <div class="sps-col sps-col--right">
      <div class="sps-panel">
        <div class="sps-panel__header"><span class="sps-panel__title">Visual Scale</span></div>
        <div class="sps-scale">
          <div class="sps-step" *ngFor="let s of scale">
            <span class="sps-step__label">{{ s.label }}</span>
            <div class="sps-step__bar-wrap">
              <div class="sps-step__bar" [style.width.%]="maxValue > 0 ? (s.value / maxValue) * 100 : 0"></div>
            </div>
            <span class="sps-step__px">{{ s.px }}</span>
            <span class="sps-step__rem">{{ s.rem }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
