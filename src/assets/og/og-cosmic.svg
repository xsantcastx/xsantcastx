<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- ░▒▓█ xsantcastx cosmic OG image — 1200×630 ░▒▓█ -->
  <defs>
    <!-- Deep cosmic backdrop gradient -->
    <radialGradient id="cosmicBg" cx="35%" cy="40%" r="80%">
      <stop offset="0%"   stop-color="#1a0b40"/>
      <stop offset="40%"  stop-color="#0a0420"/>
      <stop offset="100%" stop-color="#02010a"/>
    </radialGradient>

    <!-- Central pulsar gradient -->
    <radialGradient id="pulsar" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="6%"   stop-color="#b0f5ff" stop-opacity="0.95"/>
      <stop offset="18%"  stop-color="#00ffcc" stop-opacity="0.85"/>
      <stop offset="40%"  stop-color="#7b61ff" stop-opacity="0.55"/>
      <stop offset="65%"  stop-color="#ff6dd7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Brand text gradient (cyan→violet) -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4dffe0"/>
      <stop offset="50%"  stop-color="#7b61ff"/>
      <stop offset="100%" stop-color="#ff6dd7"/>
    </linearGradient>

    <!-- Soft glow filter for stars -->
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sigil — slowly rotating alchemical seal, baked here as a single layer -->
    <g id="sigil" fill="none" stroke="rgb(0,255,204)" stroke-width="1" stroke-opacity="0.4">
      <circle cx="0" cy="0" r="240"/>
      <circle cx="0" cy="0" r="200"/>
      <circle cx="0" cy="0" r="140"/>
      <circle cx="0" cy="0" r="86"/>
      <circle cx="0" cy="0" r="40"/>
      <polygon points="0,-240 208,120 -208,120"/>
      <polygon points="0,240 -208,-120 208,-120"/>
      <line x1="-240" y1="0" x2="240" y2="0"/>
      <line x1="0" y1="-240" x2="0" y2="240"/>
      <line x1="-170" y1="-170" x2="170" y2="170"/>
      <line x1="170" y1="-170" x2="-170" y2="170"/>
    </g>
  </defs>

  <!-- ░▒▓█ Layers ░▒▓█ -->

  <!-- Cosmic backdrop -->
  <rect width="1200" height="630" fill="url(#cosmicBg)"/>

  <!-- Sigil — large, dim, off-center -->
  <g transform="translate(900,315)" opacity="0.35">
    <use href="#sigil"/>
  </g>

  <!-- Central pulsar bloom -->
  <circle cx="600" cy="315" r="540" fill="url(#pulsar)" opacity="0.6"/>
  <circle cx="600" cy="315" r="320" fill="url(#pulsar)" opacity="0.55"/>

  <!-- Constellation: 35 stars scattered, with connection lines -->
  <g filter="url(#starGlow)">
    <!-- Connection lines (drawn first so stars overlay them) -->
    <g stroke="rgb(0,255,204)" stroke-opacity="0.22" stroke-width="0.8" fill="none">
      <line x1="180" y1="100" x2="260" y2="180"/>
      <line x1="260" y1="180" x2="340" y2="120"/>
      <line x1="340" y1="120" x2="420" y2="200"/>
      <line x1="80"  y1="280" x2="160" y2="340"/>
      <line x1="160" y1="340" x2="220" y2="420"/>
      <line x1="220" y1="420" x2="330" y2="480"/>
      <line x1="850" y1="120" x2="920" y2="80"/>
      <line x1="920" y1="80"  x2="1020" y2="160"/>
      <line x1="1020" y1="160" x2="1080" y2="230"/>
      <line x1="900" y1="450" x2="980" y2="520"/>
      <line x1="980" y1="520" x2="1080" y2="480"/>
      <line x1="500" y1="80"  x2="600" y2="140"/>
      <line x1="700" y1="100" x2="780" y2="60"/>
      <line x1="200" y1="540" x2="320" y2="560"/>
      <line x1="700" y1="540" x2="820" y2="570"/>
    </g>

    <!-- Stars (with brand-palette varied colors) -->
    <circle cx="180"  cy="100" r="3.2" fill="#4dffe0"/>
    <circle cx="260"  cy="180" r="2.5" fill="#ffffff"/>
    <circle cx="340"  cy="120" r="3"   fill="#a48bff"/>
    <circle cx="420"  cy="200" r="2.2" fill="#ff6dd7"/>
    <circle cx="80"   cy="280" r="2.5" fill="#5fb6ff"/>
    <circle cx="160"  cy="340" r="3.5" fill="#4dffe0"/>
    <circle cx="220"  cy="420" r="2.2" fill="#ffffff"/>
    <circle cx="330"  cy="480" r="3"   fill="#ffc669"/>
    <circle cx="850"  cy="120" r="2.8" fill="#7fd5a3"/>
    <circle cx="920"  cy="80"  r="3.5" fill="#4dffe0"/>
    <circle cx="1020" cy="160" r="2.5" fill="#a48bff"/>
    <circle cx="1080" cy="230" r="3"   fill="#ff6dd7"/>
    <circle cx="900"  cy="450" r="2.5" fill="#5fb6ff"/>
    <circle cx="980"  cy="520" r="3.2" fill="#ffffff"/>
    <circle cx="1080" cy="480" r="2.5" fill="#7fd5a3"/>
    <circle cx="500"  cy="80"  r="2"   fill="#ffc669"/>
    <circle cx="600"  cy="140" r="2.5" fill="#a48bff"/>
    <circle cx="700"  cy="100" r="3"   fill="#4dffe0"/>
    <circle cx="780"  cy="60"  r="2.2" fill="#ff6dd7"/>
    <circle cx="200"  cy="540" r="2.5" fill="#5fb6ff"/>
    <circle cx="320"  cy="560" r="3"   fill="#ffffff"/>
    <circle cx="700"  cy="540" r="2.5" fill="#a48bff"/>
    <circle cx="820"  cy="570" r="3.5" fill="#4dffe0"/>
    <circle cx="60"   cy="500" r="1.8" fill="#ffffff"/>
    <circle cx="1140" cy="380" r="2.2" fill="#ff6dd7"/>
    <circle cx="120"  cy="50"  r="1.8" fill="#7fd5a3"/>
    <circle cx="1180" cy="80"  r="2"   fill="#ffc669"/>
  </g>

  <!-- ░▒▓█ Content ░▒▓█ -->

  <!-- Eyebrow pill -->
  <g transform="translate(60,80)">
    <circle cx="14" cy="14" r="5" fill="#00ffcc" filter="url(#starGlow)"/>
    <text x="34" y="20" font-family="'Orbitron', 'Inter', sans-serif" font-weight="700" font-size="20" letter-spacing="6" fill="#00ffcc">FREE BROWSER TOOLS</text>
  </g>

  <!-- Brand mark — xsantcastx -->
  <text x="60" y="260" font-family="'Orbitron', 'Inter', sans-serif" font-weight="900" font-size="110" letter-spacing="2" fill="url(#brandGrad)">xsantcastx</text>

  <!-- Subtitle -->
  <text x="60" y="340" font-family="'Inter', sans-serif" font-weight="600" font-size="38" fill="#e8f0ff">Tools forged in the void.</text>
  <text x="60" y="395" font-family="'Inter', sans-serif" font-weight="400" font-size="28" fill="rgba(232,240,255,0.65)">No sign-up. No installs. Just useful things.</text>

  <!-- Stat row -->
  <g transform="translate(60,470)" font-family="'Orbitron', sans-serif">
    <!-- 123+ Tools -->
    <text x="0"   y="0" font-weight="900" font-size="56" fill="#4dffe0">123+</text>
    <text x="0"   y="36" font-size="14" letter-spacing="3" fill="rgba(232,240,255,0.6)">FREE TOOLS</text>
    <!-- divider -->
    <line x1="190" y1="-30" x2="190" y2="40" stroke="rgba(0,255,204,0.25)" stroke-width="1"/>
    <!-- Always Free -->
    <text x="220" y="0" font-weight="900" font-size="32" fill="#a48bff">ALWAYS FREE</text>
    <text x="220" y="36" font-size="14" letter-spacing="3" fill="rgba(232,240,255,0.6)">FOREVER · NO CATCH</text>
    <!-- divider -->
    <line x1="510" y1="-30" x2="510" y2="40" stroke="rgba(123,97,255,0.25)" stroke-width="1"/>
    <!-- Built in public -->
    <text x="540" y="0" font-weight="900" font-size="32" fill="#ff6dd7">BUILT IN PUBLIC</text>
    <text x="540" y="36" font-size="14" letter-spacing="3" fill="rgba(232,240,255,0.6)">WATCH IT HAPPEN LIVE</text>
  </g>

  <!-- URL bottom-right -->
  <text x="1140" y="600" text-anchor="end" font-family="'Orbitron', sans-serif" font-weight="600" font-size="22" letter-spacing="4" fill="rgba(0,255,204,0.7)">xsantcastx.com</text>

  <!-- Cosmic flourish runes at corners -->
  <text x="60"   y="610" font-family="serif" font-size="20" fill="rgba(0,255,204,0.5)">✦</text>
  <text x="1140" y="80"  font-family="serif" font-size="20" fill="rgba(255,109,215,0.5)" text-anchor="end">⟡</text>
</svg>
